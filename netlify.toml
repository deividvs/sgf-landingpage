# Configuração de deploy + cache (Netlify)
# Publica a raiz do repositório como site estático.

[build]
  publish = "."

# ── Cache de longo prazo para assets estáticos ───────────────────────────────
# Imagens, CSS e JS desta landing mudam raramente. Cache de 1 ano elimina o
# alerta "Use ciclos de vida eficientes de cache" do PageSpeed.
# OBS: como os nomes de arquivo não têm hash, ao trocar uma imagem use um nome
# novo (ex.: hero-header-v2.png) ou faça um redeploy para invalidar o CDN.

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML sempre revalidado para refletir mudanças de conteúdo na hora.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
