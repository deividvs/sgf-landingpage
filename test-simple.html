<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #16a34a;
            margin: 0 0 1rem 0;
            font-size: 2rem;
        }
        p {
            color: #666;
            margin: 0 0 1.5rem 0;
            line-height: 1.6;
        }
        .status {
            display: inline-block;
            background: #dcfce7;
            color: #16a34a;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sistema de Simulação Pecuária</h1>
        <p>Se você está vendo esta página, significa que o servidor está funcionando!</p>
        <div class="status">✓ Servidor Online</div>
        <p style="margin-top: 1.5rem; font-size: 0.875rem;">
            A aplicação principal React está carregando...
        </p>
    </div>
    <script>
        console.log('Test page loaded successfully');
        console.log('Window location:', window.location.href);
        console.log('Document ready state:', document.readyState);
    </script>
</body>
</html>
