<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #16a34a;
            margin: 0 0 1rem 0;
        }
        p {
            color: #6b7280;
            margin: 0;
        }
        .status {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: #dcfce7;
            color: #16a34a;
            border-radius: 0.5rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sistema de Simulação Pecuária</h1>
        <p>A aplicação React está sendo carregada...</p>
        <div class="status">✓ Servidor Ativo</div>
        <script>
            console.log('Test page loaded successfully');
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        </script>
    </div>
</body>
</html>
